name: Update Nodes

on:
  schedule:
    - cron: '0 * * * *'  # every hour
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Fetch node lists from export API
        run: |
          curl -sf "https://istat.online/api/v1/export?format=v2raymg&source=icmp" | grep -v '^#' > icmp_nodes.yaml
          curl -sf "https://istat.online/api/v1/export?format=v2raymg&source=tcpping" | grep -v '^#' > tcp_nodes.yaml

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add icmp_nodes.yaml tcp_nodes.yaml
          if git diff --cached --quiet; then
            echo "No changes, skipping commit."
          else
            git commit -m "chore: update nodes $(TZ='Asia/Shanghai' date +%Y-%m-%dT%H:%M:%S+08:00)"
            git push
          fi
